name: Lint

on: push

jobs:
  build:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        env:
          # o Chromium do Puppeteer nao e necessario para o lint
          PUPPETEER_SKIP_DOWNLOAD: "true"
        run: npm ci

      - name: Lint
        run: npm run lint
